# GitHub Dependabot — opens PRs for outdated / vulnerable dependencies.
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
    # npm/bun dependencies (uses package.json + bun.lock)
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
      open-pull-requests-limit: 10
      labels:
          - 'dependencies'
      # Group routine bumps so the PR queue doesn't explode. Security-related
      # advisories ignore grouping and open immediately, by Dependabot default.
      groups:
          dev-dependencies:
              dependency-type: 'development'
              update-types:
                  - 'minor'
                  - 'patch'
          prod-minor-patch:
              dependency-type: 'production'
              update-types:
                  - 'minor'
                  - 'patch'

    # GitHub Actions workflow versions
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
      labels:
          - 'dependencies'
          - 'ci'
